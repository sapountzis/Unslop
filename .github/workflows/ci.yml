name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  extension-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: Install extension dependencies
        run: |
          cd extension
          bun install --frozen-lockfile
      - name: Run extension tests
        run: |
          cd extension
          bun test src/
