name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.8

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: bun install

      - name: Type check (backend)
        working-directory: ./backend
        run: bun run type-check

      - name: Run tests (backend)
        working-directory: ./backend
        run: bun test
