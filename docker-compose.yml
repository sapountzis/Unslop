# Docker Compose for local development
# Provides PostgreSQL database for Unslop backend

services:
  postgres:
    image: postgres:18.1
    container_name: unslop-postgres
    environment:
      POSTGRES_USER: unslop
      POSTGRES_PASSWORD: unslop_dev_password
      POSTGRES_DB: unslop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unslop -d unslop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
