<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unslop Statistics</title>
  <style>
    :root {
      --bg: #070A12;
      --bg2: #0B1020;
      --card: rgba(255,255,255,0.06);
      --card2: rgba(255,255,255,0.09);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --faint: rgba(255,255,255,0.52);
      --border: rgba(255,255,255,0.14);
      --border2: rgba(255,255,255,0.22);
      --accent: #5AA2FF;
      --accent2: #B45CFF;
      --good: #46E3A6;
      --warning: #FF6B6B;
      --keep: #46E3A6;
      --dim: #FFB54C;
      --hide: #FF6B6B;
      --radius: 12px;
      --radius2: 16px;
      --font: 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(600px 400px at 20% -10%, rgba(90,162,255,0.15), transparent 55%),
                  radial-gradient(500px 300px at 80% 10%, rgba(180,92,255,0.12), transparent 50%),
                  linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    header {
      margin-bottom: 48px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 24px;
      text-align: center;
    }

    .stat-card h3 {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .stat-detail {
      font-size: 12px;
      color: var(--faint);
    }

    .breakdown-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 24px;
      margin-bottom: 32px;
    }

    .breakdown-section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .breakdown-row:last-child {
      border-bottom: none;
    }

    .breakdown-label {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .breakdown-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .breakdown-dot.keep { background: var(--keep); }
    .breakdown-dot.dim { background: var(--dim); }
    .breakdown-dot.hide { background: var(--hide); }

    .breakdown-name {
      font-size: 14px;
      color: var(--text);
    }

    .breakdown-bar-container {
      flex: 2;
      height: 8px;
      background: var(--bg2);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 16px;
    }

    .breakdown-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .breakdown-bar.keep { background: var(--keep); }
    .breakdown-bar.dim { background: var(--dim); }
    .breakdown-bar.hide { background: var(--hide); }

    .breakdown-count {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      min-width: 60px;
      text-align: right;
    }

    .chart-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 24px;
      margin-bottom: 32px;
    }

    .chart-section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    .chart-container {
      position: relative;
      height: 250px;
    }


    .loading {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }

    .error {
      text-align: center;
      padding: 48px;
      color: var(--warning);
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--text);
    }

    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .stat-value {
        font-size: 28px;
      }

      .breakdown-bar-container {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="#" class="back-btn" id="back-btn">← Back to Extension</a>

    <header>
      <h1>Your Statistics</h1>
      <p class="subtitle">See how Unslop has been filtering your LinkedIn feed</p>
    </header>

    <div id="content">
      <div class="loading">Loading statistics...</div>
    </div>
  </div>

  <script type="module" src="./src/stats/index.ts"></script>
</body>
</html>
