<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unslop Statistics</title>
  <link rel="icon" type="image/svg+xml" href="./icons/logo.svg">
  <link rel="stylesheet" href="./src/styles/shared.css">
  <style>
    /* Stats page-specific styles */
    body {
      min-height: 100vh;
      background: radial-gradient(600px 400px at 20% -10%, rgba(90,162,255,0.15), transparent 55%),
                  radial-gradient(500px 300px at 80% 10%, rgba(180,92,255,0.12), transparent 50%),
                  linear-gradient(180deg, var(--bg), var(--bg2));
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    header {
      margin-bottom: 48px;
      text-align: center;
    }

    .brand-row {
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="#" class="back-btn" id="back-btn">← Back to Extension</a>

    <header>
      <div class="brand brand--center brand-row" aria-label="Unslop">
        <img class="brand__mark" src="./icons/logo.svg" alt="" aria-hidden="true" />
        <span class="brand__name">Unslop</span>
      </div>
      <h1>Your Statistics</h1>
      <p class="subtitle">See how Unslop has been filtering your LinkedIn feed</p>
    </header>

    <div id="content">
      <div class="loading">Loading statistics...</div>
    </div>
  </div>

  <script type="module" src="./src/stats/index.ts"></script>
</body>
</html>
